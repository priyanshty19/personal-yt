<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src https: data:; style-src 'unsafe-inline'; script-src 'self';" />
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
      html, body { height: 100%; background: transparent; overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

      /* The whole bezel is draggable except interactive controls. */
      #bezel {
        -webkit-app-region: drag;
        height: 100%;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(22, 22, 26, 0.78);
        backdrop-filter: blur(24px) saturate(150%);
        -webkit-backdrop-filter: blur(24px) saturate(150%);
        border: 0.5px solid rgba(255, 255, 255, 0.10);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
        color: #fff;
      }

      #art {
        width: 56px; height: 56px; flex: 0 0 56px;
        border-radius: 10px; object-fit: cover;
        background: #2a2a30;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      }

      #mid { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
      #title { font-size: 13px; font-weight: 600; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; }
      #artist { font-size: 11px; opacity: 0.65; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; }

      /* Progress bar */
      #bar { -webkit-app-region: no-drag; height: 4px; border-radius: 2px;
        background: rgba(255,255,255,0.18); cursor: pointer; position: relative;
        margin-top: 2px; }
      #fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
        background: #ff0033; border-radius: 2px; }

      #controls { display: flex; align-items: center; gap: 6px; }
      button {
        -webkit-app-region: no-drag;
        background: transparent; border: none; color: #fff; cursor: pointer;
        width: 32px; height: 32px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.15s;
      }
      button:hover { background: rgba(255,255,255,0.14); }
      button svg { width: 18px; height: 18px; fill: #fff; }
      #play { width: 38px; height: 38px; background: rgba(255,255,255,0.12); }
      #play svg { width: 20px; height: 20px; }

      #close {
        -webkit-app-region: no-drag;
        position: absolute; top: 6px; right: 8px;
        width: 16px; height: 16px; border-radius: 50%;
        font-size: 11px; line-height: 16px; opacity: 0; color: #fff;
        background: rgba(255,255,255,0.15);
      }
      #bezel:hover #close { opacity: 0.7; }
    </style>
  </head>
  <body>
    <div id="bezel">
      <img id="art" alt="" />
      <div id="mid">
        <div id="title">Not playing</div>
        <div id="artist"></div>
        <div id="bar"><div id="fill"></div></div>
      </div>
      <div id="controls">
        <button id="prev" title="Previous">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="play" title="Play/Pause">
          <svg viewBox="0 0 24 24"><path id="playIcon" d="M8 5v14l11-7z"/></svg>
        </button>
        <button id="next" title="Next">
          <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
        </button>
      </div>
      <button id="close" title="Hide">✕</button>
    </div>

    <script src="widget.js"></script>
  </body>
</html>
